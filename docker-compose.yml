version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: lab_mysql
    command: ["--default-authentication-plugin=mysql_native_password"]
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lab_manage
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: lab_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/lab_manage?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      JWT_SECRET: change-me-in-prod
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    container_name: lab_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: http://localhost:8080
    depends_on:
      - backend

volumes:
  db_data:
