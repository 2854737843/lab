spring:
  application:
    name: lab-backend
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  datasource:
    url: jdbc:mysql://localhost:3306/lab_manage?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: user
    password: password

server:
  port: 8080

app:
  jwt:
    issuer: lab-system
    expirationMinutes: 120

logging:
  level:
    org.springframework.security: INFO
